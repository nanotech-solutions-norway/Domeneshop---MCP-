name: Validate Domeneshop MCP Repository

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate repository structure and placeholder values
        run: python scripts/validate_repository_structure.py

      - name: Confirm controlled defaults
        run: |
          grep -q '^WRITE_TOOLS_ENABLED=false$' config/domeneshop-mcp.env.example
          grep -q '^DRY_RUN_DEFAULT=true$' config/domeneshop-mcp.env.example
          grep -q '^REQUIRE_OPERATOR_APPROVAL=true$' config/domeneshop-mcp.env.example

      - name: Install package with test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run mocked tests
        run: pytest -q

      - name: Generate Phase 5 dry-run report
        run: |
          mkdir -p artifacts
          python scripts/dry_run_plan.py --source-root . --target-root /www --output artifacts/phase5-dry-run-report.json

      - name: Upload Phase 5 dry-run report artifact
        uses: actions/upload-artifact@v4
        with:
          name: phase5-dry-run-report
          path: artifacts/phase5-dry-run-report.json
          if-no-files-found: error
